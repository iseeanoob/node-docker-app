apiVersion: apps/v1
kind: Deployment
metadata:
  name: self-healing-demo
spec:
  replicas: 3
  selector:
    matchLabels:
      app: shiny-app
  template:
    metadata:
      labels:
        app: shiny-app
    spec:
      containers:
      - name: nginx-container
        image: nginx
        ports:
        - containerPort: 80
        # HER ER MAGIEN:
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: shiny-service
spec:
  selector:
    app: shiny-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: LoadBalancer